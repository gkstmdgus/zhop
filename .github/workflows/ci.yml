name: ci

# Sanity build on every push/PR so a broken commit never reaches a release.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add wasm32-wasip1 target
        run: rustup target add wasm32-wasip1
      - name: Build
        run: cargo build --release
